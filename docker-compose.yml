version: '3.8'

services:
  telegram_bot_api:
    build:
      context: .
      dockerfile: Dockerfile.telegram-bot
    environment:
      - API_ID=${API_ID}
      - API_HASH=${API_HASH}
    restart: unless-stopped
    networks:
      - bot_network
    depends_on:
      mongo:
        condition: service_healthy
    command: >
      sh -c "sleep 10 && ./bin/telegram-bot-api --local --api-id=$API_ID --api-hash=$API_HASH --http-port=8081"

  python_bot:
    build:
      context: .
      dockerfile: Dockerfile.python
    # Необходимые привилегии для запуска systemd и работы с cgroup
    privileged: true
    environment:
      - API_TOKEN=${API_TOKEN}                  # Токен Telegram бота
      - NORDVPN_TOKEN=${NORDVPN_TOKEN}          # Токен NordVPN API
      - LOCAL_API_URL=http://telegram_bot_api:8081  # URL API телеграм
      - MONGO_URI=mongodb://mongo:27017/telegram_bot_d  # URI MongoDB
      - NORDVPN_TECHNOLOGY=nordlynx             # Протокол подключения
      - NORDVPN_KILLSWITCH=on                   # Аварийный разрыв соединения
      - NORDVPN_AUTOCONNECT=off                 # Автоподключение
      - NORDVPN_GROUP=p2p                       # Группа серверов
      - DOWNLOAD_TIMEOUT=300                    # Таймаут загрузки (сек)
      - MAX_FILE_SIZE=2000                      # Макс. размер файла (МБ)
      - TMP_DIR=/app/temp                       # Директория для временных файлов
      - LOG_LEVEL=INFO                          # Уровень логирования
      - LOG_FORMAT=json                         # Формат логов
      - PYTHONUNBUFFERED=1                      # Не буферизовать вывод
      - TZ=Europe/Moscow                        # Часовой пояс
    depends_on:
      mongo:
        condition: service_healthy
      telegram_bot_api:
        condition: service_started
    networks:
      - bot_network
    volumes:
      - ./temp:/app/temp              # Монтирование временной директории приложения
      - /sys/fs/cgroup:/sys/fs/cgroup:ro  # Для корректной работы systemd
    # Вместо прямого запуска Python-скрипта, запускаем systemd
    command: [ "/sbin/init" ]
    restart: unless-stopped

  mongo:
    image: mongo:5.0
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - bot_network
    command: mongod --quiet --logpath /dev/null
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
    driver: local

networks:
  bot_network:
    driver: bridge
