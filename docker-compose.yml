version: '3.8'

services:
  telegram_bot_api:
    build:
      context: .
      dockerfile: Dockerfile.telegram-bot
    environment:
      - API_ID=${API_ID}
      - API_HASH=${API_HASH}
    restart: unless-stopped
    networks:
      - bot_network
    depends_on:
      mongo:
        condition: service_healthy
    command: >
      sh -c "sleep 10 && ./bin/telegram-bot-api --local --api-id=$API_ID --api-hash=$API_HASH --http-port=8081"

  python_bot:
    build:
      context: .
      dockerfile: Dockerfile.python
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun
    environment:
      - API_TOKEN=${API_TOKEN}
      - NORDVPN_TOKEN=${NORDVPN_TOKEN}
      - LOCAL_API_URL=http://telegram_bot_api:8081
      - MONGO_URI=mongodb://mongo:27017/telegram_bot_d
      - NORDVPN_TECHNOLOGY=nordlynx
      - NORDVPN_KILLSWITCH=on
      - NORDVPN_AUTOCONNECT=off
      - NORDVPN_GROUP=p2p
      - DOWNLOAD_TIMEOUT=300
      - MAX_FILE_SIZE=2000
      - TMP_DIR=/app/temp
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Moscow
      - PYTHONPATH=/app
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      mongo:
        condition: service_healthy
      telegram_bot_api:
        condition: service_started
    networks:
      - bot_network
    volumes:
      - ./temp:/app/temp
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    restart: unless-stopped
    # Контейнер будет запускаться через /sbin/init, указанное в Dockerfile CMD

  mongo:
    image: mongo:5.0
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - bot_network
    command: mongod --quiet --logpath /dev/null
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
    driver: local

networks:
  bot_network:
    driver: bridge
